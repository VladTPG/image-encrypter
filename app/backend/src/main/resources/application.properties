spring.application.name=app
server.port=8080

# RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:broker}
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# MySQL (for user accounts)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://storage:3306/imageencrypter}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT
app.jwt.secret=${JWT_SECRET:c2VjdXJlLWltYWdlLWVuY3J5cHRlci1qd3Qtc2VjcmV0LWtleS0yNTYtYml0cy1sb25n}
app.jwt.expiration-ms=86400000
